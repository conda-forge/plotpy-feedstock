{% set name = "plotpy" %}
{% set version = "2.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/plotpy-{{ version }}.tar.gz
  sha256: 1746c796c5484447d133f0459c6bd9a1c7324cd1910d7f1356b19d188c6d6725

build:
  skip: true  # [py>=400 or py2k]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools
    - wheel
    - numpy >=2.0
    - cython >=3.0
    - pip
  run:
    - python
    - {{ pin_compatible('numpy') }}
    - guidata >=3.14.1
    - pythonqwt >=0.15
    - scipy >=1.7.3
    - scikit-image >=0.19
    - pillow
    - tifffile
    - pyqt

test:
  imports:
    - plotpy
  commands:
    - pip check
    - set QT_QPA_PLATFORM=offscreen && pytest --collect-only --pyargs plotpy.tests  # [win]
    - QT_QPA_PLATFORM=offscreen pytest --collect-only --pyargs plotpy.tests  # [not win]
  requires:
    - pip
    - pytest
    - pytest-xvfb  # [linux]

about:
  summary: Curve and image plotting tools for Python/Qt applications
  description: |
    PlotPy is is a Python library providing efficient 2D data-plotting features for interactive computing and signal/image processing application development.
    It is part of the PlotPyStack project, aiming at providing a unified framework for creating scientific GUIs with Python and Qt.
  home: https://github.com/PlotPyStack/PlotPy
  doc_url: https://plotpy.readthedocs.io/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - PierreRaybaut
