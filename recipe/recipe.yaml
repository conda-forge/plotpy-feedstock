schema_version: 1

context:
  name: plotpy
  version: "2.9.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/plotpy-${{ version }}.tar.gz
  sha256: 1746c796c5484447d133f0459c6bd9a1c7324cd1910d7f1356b19d188c6d6725

build:
  number: 1
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - if: build_platform != host_platform
      then:
        - cross-python_${{ host_platform }}
        - python
        - cython
        - numpy
  host:
    - python
    - setuptools
    - wheel
    - numpy >=2.0
    - cython >=3.0
    - pip
  run:
    - python
    - guidata >=3.14.1
    - pythonqwt >=0.15
    - scipy >=1.7.3
    - scikit-image >=0.19
    - pillow
    - tifffile
    - pyqt

tests:
  - python:
      imports:
        - plotpy
      pip_check: true
  - requirements:
      run:
        - pytest
        - if: linux
          then: pytest-xvfb
    script:
      - if: win
        then: set QT_QPA_PLATFORM=offscreen && pytest --collect-only --pyargs plotpy.tests
      - if: not win
        then: QT_QPA_PLATFORM=offscreen pytest --collect-only --pyargs plotpy.tests

about:
  summary: Curve and image plotting tools for Python/Qt applications
  description: |
    PlotPy is is a Python library providing efficient 2D data-plotting features for interactive computing and signal/image processing application development.
    It is part of the PlotPyStack project, aiming at providing a unified framework for creating scientific GUIs with Python and Qt.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/PlotPyStack/PlotPy
  documentation: https://plotpy.readthedocs.io/

extra:
  recipe-maintainers:
    - PierreRaybaut
